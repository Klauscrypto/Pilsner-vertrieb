<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilsner Vertriebs GmbH</title>
<link rel="icon" type="image/png" href="/logo-icon.png">
<meta name="robots" content="noindex, nofollow">
<style>
@font-face {
  font-family: 'Inter';
  src: url('/fonts/inter.woff2') format('woff2');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #F8F9FB;
  color: #11192C;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: #fff;
  border: 1px solid #DEE3EC;
  border-radius: 8px;
  padding: 40px 48px;
  line-height: 1.8;
  font-size: 15px;
  color: #495569;
}
.card strong {
  display: block;
  color: #11192C;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 4px;
}
.card .divider {
  border: none;
  border-top: 1px solid #DEE3EC;
  margin: 20px 0;
}
a { color: #1E5BBF; text-decoration: none; }
a:hover { text-decoration: underline; }
.links { margin-top: 20px; font-size: 14px; }
.links a { margin-right: 16px; }
</style>
</head>
<body>

<div class="card">
  <strong>Pilsner Vertriebs GmbH</strong>
  Detterstraße 38<br>
  94469 Deggendorf
  <hr class="divider">
  E-Mail: <a href="mailto:info@pilsner-vertrieb.de">info@pilsner-vertrieb.de</a>
  <div class="links">
    <a href="/impressum.html">Impressum</a>
    <a href="/datenschutz.html">Datenschutzerklärung</a>
  </div>
</div>

</body>
</html>
